apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: family-day-prod

resources:
  - namespace.yaml
  - ../../base
  - sealed-ghcr-pull-secret.yaml

images:
  - name: family-day-web
    newName: ghcr.io/shahmilsaari/family-day
    newTag: "6aaff725"

patches:
  - path: patch-deployment.yaml
  - path: patch-ingress.yaml