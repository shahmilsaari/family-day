apiVersion: apps/v1
kind: Deployment
metadata:
  name: family-day-web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: family-day-web
  template:
    metadata:
      labels:
        app: family-day-web
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: web
          image: family-day-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "file:/app/data/family-day.db"
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 18
            periodSeconds: 5
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: family-day-data